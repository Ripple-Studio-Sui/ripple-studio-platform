services:
  postgres:
    image: postgres:16-alpine
    container_name: ripple-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ripple
      POSTGRES_PASSWORD: ripple
      POSTGRES_DB: ripple_studio
    volumes:
      - ripple_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ripple-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ripple_redis_data:/data

volumes:
  ripple_pg_data:
  ripple_redis_data: